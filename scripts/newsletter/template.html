<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; background-color: #0d0d0d; font-family: 'Courier New', Courier, monospace; color: #00ff41; font-size: 16px; line-height: 1.6;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #0d0d0d;">
<tr><td align="center" style="padding: 40px 16px;">
<table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width: 600px; width: 100%;">

<!-- Header -->
<tr><td style="padding-bottom: 24px; border-bottom: 1px solid #008f11;">
<a href="https://gregory.sh" style="color: #00ff41; text-decoration: none; font-family: 'Courier New', Courier, monospace; font-size: 24px;"><span style="color: #008f11;">&gt; </span>gregory.sh</a>
</td></tr>

<!-- Date -->
<tr><td style="padding: 32px 0 8px 0;">
<span style="color: #008f11; font-size: 14px; font-family: 'Courier New', Courier, monospace;">{{date}}</span>
</td></tr>

<!-- Title -->
<tr><td>
<h1 style="margin: 4px 0 24px 0; font-size: 24px; font-weight: normal; color: #00ff41; line-height: 1.3; font-family: 'Courier New', Courier, monospace;">&gt; {{title}}</h1>
</td></tr>

<!-- Body -->
<tr><td style="color: #00ff41; font-family: 'Courier New', Courier, monospace; font-size: 16px; line-height: 1.6;">
{{body}}
</td></tr>

<!-- Read more -->
<tr><td style="padding: 8px 0 0 0;">
<a href="https://gregory.sh/blog/{{slug}}" style="color: #00ff41; text-decoration: none; border-bottom: 1px solid #008f11; font-family: 'Courier New', Courier, monospace;">Continue reading &#8594;</a>
</td></tr>

<!-- Footer -->
<tr><td style="padding-top: 48px;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0">
<tr><td style="border-top: 1px solid #008f11; padding-top: 24px;">
<p style="margin: 0; color: #008f11; font-size: 13px; font-family: 'Courier New', Courier, monospace;">You&#8217;re receiving this because you subscribed at <a href="https://gregory.sh" style="color: #008f11; text-decoration: none; border-bottom: 1px solid #333;">gregory.sh</a>.</p>
<p style="margin: 8px 0 0 0; font-size: 13px; font-family: 'Courier New', Courier, monospace;"><a href="{{unsubscribe_url}}" style="color: #008f11; text-decoration: none; border-bottom: 1px solid #333;">Unsubscribe</a></p>
</td></tr>
</table>
</td></tr>

</table>
</td></tr>
</table>
</body>
</html>
